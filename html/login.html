<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MedInventory System</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <!-- Header -->
  <header>MedInventory</header>

  <!-- Main login form -->
  <div class="main-content">
    <div class="login-form">
      <h3>Login Credentials:</h3>
      <form id="loginForm">
        <fieldset>
          <legend>Your UserID</legend>

          <!-- Username -->
          <label for="Username">Username:</label>
          <input type="text" id="Username" name="Username" placeholder="Enter your UserID" required />

          <!-- Password -->
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />

          <!-- Submit button -->
<!--             
             <a hreft = "welcome.html"<button>Submit</button>
            type="submit">Submit</button> 
          </div>  -->


 
          <form action="welcome.html" method="get">
          <div class="submit-container">
           <button type="submit">Submit</button>
           </div>
            </form>




          <!-- Create Login ID link -->
          <div class="create-user-link">
            <p>Don't have an account?
              <a href="create_user.html">Create Login ID</a>
            </p>
          </div>
        </fieldset>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    &copy; com.uneecop.medicine@gmail.com <br />

    <a href="https://www.uneecops.com/contact-us/">Contact Link</a>

  <script src="../js/login.js"></script>

</html>
